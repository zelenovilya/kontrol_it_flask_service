{% extends "base.html" %}
{% block content %}<h1>Новости и база знаний</h1><form method="post" class="form-card"><label>Название<input name="title" required></label><label>Адрес slug<input name="slug" required></label><label>Краткое описание<input name="summary"></label><label>Тип<select name="article_type"><option value="knowledge">База знаний</option><option value="news">Новость</option></select></label><label>Текст<textarea name="content" required></textarea></label><button>Добавить</button></form><table><thead><tr><th>Название</th><th>Тип</th><th>Опубликовано</th></tr></thead><tbody>{% for article in articles %}<tr><td>{{ article.title }}</td><td>{{ article.article_type }}</td><td>{{ 'Да' if article.is_published else 'Нет' }}</td></tr>{% endfor %}</tbody></table>{% endblock %}
