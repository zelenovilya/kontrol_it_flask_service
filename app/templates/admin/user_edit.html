{% extends "base.html" %}
{% block content %}
<h1>Редактирование пользователя</h1>
<form method="post" class="form-card">
    <label>Логин<input name="username" value="{{ user.username }}" required></label>
    <label>Email<input name="email" type="email" value="{{ user.email }}" required></label>
    <label>ФИО<input name="full_name" value="{{ user.full_name }}" required></label>
    <label>Телефон<input name="phone" value="{{ user.phone or '' }}"></label>
    <label>Новый пароль<input name="password" placeholder="Оставьте пустым, чтобы не менять"></label>
    <label>Роль
        <select name="role_id">
            {% for role in roles %}<option value="{{ role.id }}" {% if user.role_id == role.id %}selected{% endif %}>{{ role.name }}</option>{% endfor %}
        </select>
    </label>
    <label class="inline-check"><input type="checkbox" name="is_active_account" {% if user.is_active_account %}checked{% endif %}> Учетная запись активна</label>
    <button>Сохранить</button>
</form>
{% endblock %}
