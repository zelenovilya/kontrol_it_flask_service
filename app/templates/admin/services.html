{% extends "base.html" %}
{% block content %}
<h1>Услуги</h1>
<form method="post" class="form-card"><label>Название<input name="name" required></label><label>Описание<textarea name="description"></textarea></label><label>Стоимость<input name="price" type="number" step="0.01"></label><label>Категория<select name="category_id">{% for category in categories %}<option value="{{ category.id }}">{{ category.name }}</option>{% endfor %}</select></label><button>Добавить</button></form>
<table><thead><tr><th>Название</th><th>Категория</th><th>Стоимость</th></tr></thead><tbody>{% for service in services %}<tr><td>{{ service.name }}</td><td>{{ service.category.name }}</td><td>{{ service.price }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
