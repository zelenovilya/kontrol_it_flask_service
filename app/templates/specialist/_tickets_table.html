<table>
    <thead><tr><th>№</th><th>Дата</th><th>Клиент</th><th>Тема</th><th>Статус</th><th>Открыть</th></tr></thead>
    <tbody>
    {% for ticket in tickets %}
    <tr>
        <td>{{ ticket.id }}</td><td>{{ ticket.created_at.strftime('%d.%m.%Y') }}</td><td>{{ ticket.client.organization_name }}</td><td>{{ ticket.title }}</td><td>{{ ticket.status.name }}</td><td><a href="{{ url_for('specialist.ticket_detail', ticket_id=ticket.id) }}">Открыть</a></td>
    </tr>
    {% else %}<tr><td colspan="6">Заявки отсутствуют.</td></tr>{% endfor %}
    </tbody>
</table>
